body:
  text: 僧祐録云安公失譯經人名今附西晉録聞如是一時佛遊舍衛國祇樹給孤獨之園佛告諸比丘法者常在有佛無佛法住如故如來至真出現世間因為宣解分別深義敷演至慧志在小乘為說四諦苦習盡道生苦老苦病苦死苦求不得苦舉要言之有陰身苦設無有身當有何患是曰苦諦目貪於色耳鼻身口意亦復如是由此因緣成其六衰從來劫數甚大久矣既諦見斯已知為惡習悉無益身因守身行護其心口十惡以拔十二因緣根本則滅滅除三毒空無相願由成羅漢緣十二因知其牽連斷其根源輒成緣覺解身本空奉六度無極四等四恩道品之法三十有七空無相願無此三事不為取證六通善權常濟危厄等心一切無所適莫故曰菩薩逮不退轉當成無上正真之道為最正覺度脫十方故號為佛道法常存行者與合無彼無此猶如衆流未到海時各有本名以合于海無有異號道德若茲去來今佛合一法身行與道合因為衆生分別演說陰衰諸入十二牽連皆為病疾諸度無極四等四恩為大法藥療衆生病淨如虛空明踰日光德超須彌神聖巍巍莫能譏謗衆罪消滅無復諸苦以大慈悲度脫十方佛說是時諸比丘衆漏盡意解無數菩薩尋時逮得無所從生法忍佛說如是諸比丘及諸菩薩諸天龍神聞佛所說歡喜奉行
